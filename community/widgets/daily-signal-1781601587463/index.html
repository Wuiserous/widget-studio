<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Signal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="widget" id="widget">
    <header class="topbar">
      <div class="identity">
        <span class="signal-dot" aria-hidden="true"></span>
        <span class="eyebrow">DAILY SIGNAL</span>
      </div>
      <time class="date-code" id="dateCode"></time>
    </header>

    <section class="hero" aria-labelledby="streakLabel">
      <div class="streak-copy">
        <span class="micro-label" id="streakLabel">CURRENT STREAK</span>
        <div class="streak-row">
          <strong class="streak-value" id="streakValue">0</strong>
          <span class="streak-unit">DAYS</span>
        </div>
      </div>
      <div class="status-mark" id="statusMark" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
    </section>

    <section class="action-panel">
      <div class="today-copy">
        <span class="micro-label">TODAY / <span id="todayDay">SAT</span> / <span id="timeCue">DAY OPEN</span></span>
        <strong id="todayState">AWAITING CHECK-IN</strong>
      </div>
      <button class="check-button" id="checkButton" type="button" aria-pressed="false">
        <span class="button-icon" aria-hidden="true"></span>
        <span id="buttonText">MARK DONE</span>
      </button>
    </section>

    <section class="week-panel" aria-label="This week">
      <div class="section-heading">
        <span class="micro-label">7 DAY READOUT</span>
        <span class="week-score" id="weekScore">0/7</span>
      </div>
      <div class="week-strip" id="weekStrip"></div>
    </section>

    <section class="heat-panel" aria-label="Habit consistency heat map">
      <div class="section-heading">
        <span class="micro-label">CONSISTENCY / 12 WEEKS</span>
        <span class="heat-key"><i></i> DONE</span>
      </div>
      <div class="heat-map" id="heatMap"></div>
    </section>

    <footer class="stats-panel">
      <div class="stat">
        <span class="micro-label">BEST</span>
        <strong id="bestValue">0D</strong>
      </div>
      <div class="stat">
        <span class="micro-label">30D RATE</span>
        <strong id="rateValue">0%</strong>
      </div>
      <p class="message" id="message">START THE CHAIN. RETURN TOMORROW.</p>
    </footer>
  </main>
  <script src="widget.js"></script>
</body>
</html>
